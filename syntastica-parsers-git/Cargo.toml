[package]
name = "syntatica-parsers-git"
version.workspace = true
authors.workspace = true
documentation = "https://casualjim.github.io/syntastica/syntatica_parsers_git/"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Collection of tree-sitter parsers for syntastica, fetching with git in the build-script"

[lints]
workspace = true

[dependencies]
syntastica-core.workspace = true
syntastica-macros.workspace = true
syntastica-queries.workspace = true

document-features = { workspace = true, optional = true }
once_cell.workspace = true
strum = { workspace = true, features = ["derive", "phf"] }

[target.wasm32-unknown-unknown.dependencies]
# TODO: switch to official when https://github.com/trevyn/wasm32-unknown-unknown-openbsd-libc/pull/3 is merged
wasm32-unknown-unknown-openbsd-libc = { version = "0.2.1", package = "wasm32-unknown-unknown-openbsd-libc-wctypes-fix" }

[build-dependencies]
syntastica-macros.workspace = true

cc.workspace = true
rustc_version = { workspace = true, optional = true }
tree-sitter-generate.workspace = true

[package.metadata.docs.rs]
all-features = true

###########################################
### All following code is autogenerated ###
### by running `cargo xtask codegen` in ###
### the syntastica workspace. #############
###########################################

[features]
#! ## Features
default = ["runtime-c"]

#! Every supported language has a feature with the same name as the respective public function.
#! Additionally the three feature groups
#! <span class="stab portability"><code>some</code></span>,
#! <span class="stab portability"><code>most</code></span>, and
#! <span class="stab portability"><code>all</code></span>
#! are available.

